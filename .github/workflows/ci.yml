name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A new push makes the previous run's answer irrelevant, so stop it rather than
# pay for both.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --omit=optional skips tesseract.js (the OCR engine no test exercises).
      # @napi-rs/canvas stays -- it is a regular dependency because pdfjs needs
      # it for DOMMatrix during PDF text extraction, which the tests do cover.
      - run: npm ci --omit=optional

      # No secrets here on purpose. The suite covers the chunker, sentence
      # splitting, PDF cleaning, EPUB/DOCX extraction, pronunciation rules,
      # retry/backoff, ffmpeg stitching and RSS rendering, and every one of
      # those is exercised with generated fixtures and the ffmpeg-static
      # binary -- so a fork's PR runs the full suite with nothing configured.
      # The scripts that do need credentials (verify-schema, verify-documents,
      # verify-worker, verify-sse) hit the real database and spend real
      # ElevenLabs credits, so they stay manual.
      - name: Run tests
        run: npm test

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tts-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tts-frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      # Placeholder values: the build only bundles these, it never dials out.
      # Real ones would add nothing and would put credentials in CI logs.
      - name: Build
        run: npm run build
        env:
          VITE_BACKEND_URL: http://localhost:5000
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder-key

  format:
    name: Formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # --check rather than --write: CI reports, it does not quietly rewrite the
      # branch under the author.
      - name: Check formatting
        run: npx prettier@3 --check "**/*.{js,jsx,json,md}"
