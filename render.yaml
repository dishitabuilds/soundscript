# Render deployment for SoundScript: the API (a persistent Node service) and
# the web frontend (a static Vite build), from one Blueprint.
#
# Why the API is a persistent service, not serverless: it responds immediately
# and keeps synthesising in the background, and it holds SSE connections open
# while a job runs. Serverless functions are killed once the response is sent,
# which would end every job at the moment it started. Render runs a persistent
# process, so the worker pool and the event stream both survive.

services:
  # ---------------------------------------------------------------------------
  # API
  # ---------------------------------------------------------------------------
  - type: web
    name: soundscript-api
    runtime: node
    plan: free
    region: singapore

    # ci, not install: it installs exactly what package-lock.json pins, so a
    # deploy cannot quietly pick up a different version than the one tested.
    #
    # Full install (no --omit=optional): pdfjs needs @napi-rs/canvas for
    # DOMMatrix on every PDF, and that package ships its native binary as its
    # own optional platform dependency -- --omit=optional would strip it
    # (npm/cli#4828) and break all PDF parsing. This also installs tesseract.js,
    # so scanned-PDF OCR is available (its ~10MB model downloads on first use).
    buildCommand: npm ci
    startCommand: npm start

    # Render restarts the service if this stops answering. It reports whether the
    # API keys are actually present, so a misconfigured deploy is visible without
    # reading logs.
    healthCheckPath: /api/health

    envVars:
      # sync: false means "set this in the dashboard, never in the repo".
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ELEVEN_API_KEY
        sync: false

      # Optional extras -- set in the dashboard if used. The service role key
      # enables the podcast feed; OPENAI_API_KEY adds a second voice provider
      # (and a fallback when ElevenLabs' monthly quota runs out).
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # Comma-separated allow-list; every other browser origin is refused by
      # CORS. This is this deployment's web origin -- update it if you rename
      # the web service. (Use * to allow any origin.)
      - key: ALLOWED_ORIGINS
        value: https://soundscript-web.onrender.com

      - key: DAILY_CHAR_QUOTA
        value: "10000"

      # Conservative on the free plan's shared CPU: each worker holds an HTTP
      # request to ElevenLabs and a buffer of audio.
      - key: WORKER_CONCURRENCY
        value: "2"

      # 22, not 20: @supabase/supabase-js v2.86 requires a native WebSocket,
      # which Node only ships from 22 onward. On 20 createClient throws at
      # startup and every token verification 500s.
      - key: NODE_VERSION
        value: "22"

  # ---------------------------------------------------------------------------
  # Web frontend (static Vite build)
  # ---------------------------------------------------------------------------
  - type: web
    name: soundscript-web
    runtime: static
    # Everything below is relative to this subfolder, so the same repo holds
    # both services.
    rootDir: tts-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist

    # No client-side router in this app, but a catch-all rewrite keeps a hard
    # refresh on any path serving index.html rather than 404ing.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # Baked into the bundle at build time. This deployment's API URL -- update
      # it if you rename the API service. The anon key below is safe in the
      # browser; RLS is what actually protects data.
      - key: VITE_BACKEND_URL
        value: https://soundscript-api-55nk.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
